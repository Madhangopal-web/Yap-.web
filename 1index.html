<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Vision Pro Camera</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; width:100vw; height:100vh; }
  button { -webkit-tap-highlight-color:transparent; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

/* ─── Draggable Panel ─── */
function SpatialPanel({ id, title, icon, children, initX, initY, width=280, zIndex, onFocus, onClose, dimmed }) {
  const [pos, setPos] = useState({ x:initX, y:initY });
  const drag = useRef(null);

  const onDown = (e) => {
    if (e.target.closest(".nd")) return;
    onFocus(id);
    const pt = e.touches ? e.touches[0] : e;
    drag.current = { ox: pt.clientX - pos.x, oy: pt.clientY - pos.y };
    e.preventDefault();
  };

  useEffect(() => {
    const move = (e) => {
      if (!drag.current) return;
      const pt = e.touches ? e.touches[0] : e;
      setPos({ x: pt.clientX - drag.current.ox, y: pt.clientY - drag.current.oy });
    };
    const up = () => { drag.current = null; };
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
    window.addEventListener("touchmove", move, { passive:false });
    window.addEventListener("touchend", up);
    return () => {
      window.removeEventListener("mousemove", move);
      window.removeEventListener("mouseup", up);
      window.removeEventListener("touchmove", move);
      window.removeEventListener("touchend", up);
    };
  }, []);

  return (
    <div style={{
      position:"absolute", left:pos.x, top:pos.y, width,
      zIndex, touchAction:"none",
      opacity: dimmed ? 0 : 1,
      filter: dimmed ? "blur(6px)" : "none",
      transition:"opacity 0.5s,filter 0.5s",
      pointerEvents: dimmed ? "none" : "auto",
    }}>
      <div style={{
        borderRadius:20, overflow:"hidden",
        background:"rgba(10,10,25,0.6)",
        backdropFilter:"blur(40px) saturate(150%)",
        WebkitBackdropFilter:"blur(40px) saturate(150%)",
        border:"1px solid rgba(255,255,255,0.18)",
        boxShadow:"0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.12)",
      }}>
        <div onMouseDown={onDown} onTouchStart={onDown}
          style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 14px",
            background:"rgba(255,255,255,0.03)", borderBottom:"1px solid rgba(255,255,255,0.07)",
            cursor:"grab", userSelect:"none" }}>
          <div className="nd" style={{ display:"flex", gap:5 }}>
            <button onClick={()=>onClose(id)} style={{ width:11,height:11,borderRadius:"50%",background:"#ff5f57",border:"none",cursor:"pointer",padding:0 }}/>
            <div style={{ width:11,height:11,borderRadius:"50%",background:"#febc2e" }}/>
            <div style={{ width:11,height:11,borderRadius:"50%",background:"#28c840" }}/>
          </div>
          <span style={{ fontSize:12,color:"rgba(255,255,255,0.7)",fontFamily:"system-ui",fontWeight:500 }}>{icon} {title}</span>
          <div style={{ marginLeft:"auto",fontSize:8,color:"rgba(255,255,255,0.18)",fontFamily:"monospace",letterSpacing:1 }}>visionOS</div>
        </div>
        {children}
      </div>
      <div style={{ margin:"7px auto 0",width:32,height:4,borderRadius:2,background:"rgba(255,255,255,0.18)" }}/>
    </div>
  );
}

/* ─── Camera Feed ─── */
function CameraFeed({ darkMode }) {
  const videoRef = useRef(null);
  const [status, setStatus] = useState("idle");
  const [errMsg, setErrMsg] = useState("");

  const startCamera = async () => {
    setStatus("loading");
    setErrMsg("");

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      setErrMsg("Camera API not available.\nPlease open this file in Chrome browser.");
      setStatus("error");
      return;
    }

    const constraints = [
      { video: { facingMode: { exact: "environment" } }, audio: false },
      { video: { facingMode: "environment" }, audio: false },
      { video: true, audio: false },
    ];

    let stream = null;
    for (const c of constraints) {
      try { stream = await navigator.mediaDevices.getUserMedia(c); break; }
      catch (e) {
        if (e.name === "NotAllowedError" || e.name === "PermissionDeniedError") {
          setErrMsg("Permission denied.\nPlease tap Allow when browser asks for camera access.");
          setStatus("error"); return;
        }
      }
    }

    if (!stream) {
      setErrMsg("Could not start camera.\nMake sure no other app is using it.");
      setStatus("error"); return;
    }

    try {
      const v = videoRef.current;
      v.srcObject = stream;
      v.setAttribute("playsinline","");
      v.setAttribute("webkit-playsinline","");
      await v.play();
      setStatus("active");
    } catch (e) {
      setErrMsg("Video play failed: " + e.message);
      setStatus("error");
    }
  };

  return (
    <>
      <video ref={videoRef} playsInline muted
        style={{
          position:"fixed", inset:0, width:"100%", height:"100%",
          objectFit:"cover", zIndex:0,
          display: status === "active" ? "block" : "none",
          filter: darkMode ? "brightness(0.1) saturate(0.2)" : "brightness(1)",
          transition:"filter 1.2s ease",
        }}
      />
      {status !== "active" && (
        <div style={{
          position:"fixed", inset:0, zIndex:1,
          background: darkMode
            ? "radial-gradient(ellipse at 40% 50%, #050510, #000)"
            : "radial-gradient(ellipse at 30% 40%, #0d1b40, #07091e)",
          transition:"background 1.2s ease",
          display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:14,
        }}>
          <div style={{ position:"absolute",inset:0,overflow:"hidden",opacity:0.04 }}>
            {Array.from({length:10}).map((_,i)=>(
              <div key={i} style={{ position:"absolute",left:0,right:0,top:`${i*10}%`,height:1,background:"rgba(160,180,255,1)" }}/>
            ))}
            {Array.from({length:7}).map((_,i)=>(
              <div key={i} style={{ position:"absolute",top:0,bottom:0,left:`${i*14.3}%`,width:1,background:"rgba(160,180,255,1)" }}/>
            ))}
          </div>

          <div style={{ fontSize:52 }}>📷</div>

          {status === "error" ? (
            <>
              <div style={{ background:"rgba(255,80,80,0.15)",border:"1px solid rgba(255,80,80,0.3)",
                borderRadius:14,padding:"12px 20px",maxWidth:280,textAlign:"center" }}>
                <div style={{ color:"rgba(255,140,140,0.95)",fontSize:13,fontFamily:"system-ui",lineHeight:1.7,whiteSpace:"pre-line" }}>
                  ⚠️ {errMsg}
                </div>
              </div>
              <button onClick={startCamera} style={{
                background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.25)",
                color:"white",borderRadius:50,padding:"10px 28px",fontSize:14,
                fontFamily:"system-ui",fontWeight:600,cursor:"pointer",
              }}>Try Again</button>
            </>
          ) : (
            <>
              <p style={{ color:"rgba(255,255,255,0.5)",fontSize:13,fontFamily:"system-ui",
                textAlign:"center",padding:"0 40px",lineHeight:1.6 }}>
                {status === "loading" ? "Starting camera…" : "Use your camera as the background, like Vision Pro passthrough"}
              </p>
              {status === "idle" && (
                <button onClick={startCamera} style={{
                  background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.3)",
                  color:"white",borderRadius:50,padding:"13px 34px",fontSize:15,
                  fontFamily:"system-ui",fontWeight:600,cursor:"pointer",
                  boxShadow:"0 4px 20px rgba(0,0,0,0.4)",
                }}>📷  Enable Camera</button>
              )}
              {status === "loading" && (
                <div style={{ color:"rgba(255,255,255,0.35)",fontSize:12,fontFamily:"system-ui",textAlign:"center" }}>
                  Please tap Allow when browser prompts…
                </div>
              )}
            </>
          )}
          <div style={{ position:"absolute",bottom:110,left:0,right:0,textAlign:"center",
            color:"rgba(255,255,255,0.12)",fontSize:9,fontFamily:"monospace",letterSpacing:1.5 }}>
            BEST IN CHROME • REQUIRES CAMERA PERMISSION
          </div>
        </div>
      )}
    </>
  );
}

/* ─── Widgets ─── */
function ClockWidget() {
  const [t, setT] = useState(new Date());
  useEffect(()=>{ const i=setInterval(()=>setT(new Date()),1000); return ()=>clearInterval(i); },[]);
  const pad = n => String(n).padStart(2,"0");
  const s=t.getSeconds(), m=t.getMinutes();
  return (
    <div style={{ padding:"16px",textAlign:"center" }}>
      <div style={{ fontSize:40,fontWeight:200,color:"white",letterSpacing:-1,fontFamily:"system-ui" }}>
        {pad(t.getHours())}:{pad(m)}<span style={{ fontSize:22,color:"rgba(255,255,255,0.4)",marginLeft:3 }}>{pad(s)}</span>
      </div>
      <div style={{ color:"rgba(255,255,255,0.35)",fontSize:11,marginTop:5,fontFamily:"system-ui" }}>
        {t.toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"})}
      </div>
      <svg viewBox="0 0 80 80" style={{ width:72,height:72,marginTop:12 }}>
        <circle cx="40" cy="40" r="36" fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="3"/>
        <circle cx="40" cy="40" r="36" fill="none" stroke="rgba(180,200,255,0.65)" strokeWidth="2"
          strokeDasharray={`${(s/60)*226} 226`} strokeLinecap="round" transform="rotate(-90 40 40)"/>
        <circle cx="40" cy="40" r="36" fill="none" stroke="rgba(255,255,255,0.22)" strokeWidth="1.5"
          strokeDasharray={`${(m/60)*226} 226`} strokeLinecap="round" transform="rotate(-90 40 40)"/>
      </svg>
    </div>
  );
}

function MusicWidget() {
  const [playing,setPlaying]=useState(false);
  const [prog,setProg]=useState(38);
  useEffect(()=>{
    if(!playing)return;
    const i=setInterval(()=>setProg(p=>p>=100?0:p+0.3),100);
    return ()=>clearInterval(i);
  },[playing]);
  return (
    <div style={{ padding:"12px 14px" }}>
      <div style={{ display:"flex",alignItems:"center",gap:10,marginBottom:12 }}>
        <div style={{ width:42,height:42,borderRadius:10,background:"linear-gradient(135deg,#4f46e5,#7c3aed)",
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0 }}>🎵</div>
        <div>
          <div style={{ color:"white",fontSize:13,fontWeight:600,fontFamily:"system-ui" }}>Starlight Drift</div>
          <div style={{ color:"rgba(255,255,255,0.4)",fontSize:11,marginTop:1 }}>AURORA • Ambient</div>
        </div>
      </div>
      <div style={{ height:3,background:"rgba(255,255,255,0.1)",borderRadius:2,marginBottom:12 }}>
        <div style={{ width:`${prog}%`,height:"100%",background:"rgba(180,160,255,0.9)",borderRadius:2 }}/>
      </div>
      <div style={{ display:"flex",justifyContent:"center",gap:18,alignItems:"center" }}>
        {["⏮",playing?"⏸":"▶","⏭"].map((btn,i)=>(
          <button key={i} onClick={()=>i===1&&setPlaying(!playing)} style={{
            background:i===1?"rgba(255,255,255,0.9)":"rgba(255,255,255,0.08)",
            border:"1px solid rgba(255,255,255,0.15)",color:i===1?"#000":"white",
            borderRadius:i===1?"50%":10,width:i===1?36:32,height:i===1?36:32,
            fontSize:i===1?13:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
          }}>{btn}</button>
        ))}
      </div>
    </div>
  );
}

function NotesWidget() {
  const [text,setText]=useState("Vision Pro is 🔥");
  return (
    <div style={{ padding:12 }}>
      <textarea value={text} onChange={e=>setText(e.target.value)}
        style={{ width:"100%",height:90,background:"transparent",border:"none",outline:"none",
          resize:"none",color:"rgba(255,255,255,0.8)",fontSize:13,lineHeight:1.6,
          fontFamily:"system-ui",boxSizing:"border-box" }}/>
      <div style={{ borderTop:"1px solid rgba(255,255,255,0.08)",paddingTop:6,marginTop:2,
        color:"rgba(255,255,255,0.2)",fontSize:10,textAlign:"right" }}>{text.length} chars</div>
    </div>
  );
}

function WeatherWidget() {
  return (
    <div style={{ padding:"14px 16px" }}>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start" }}>
        <div>
          <div style={{ fontSize:38,fontWeight:200,color:"white",fontFamily:"system-ui" }}>24°</div>
          <div style={{ color:"rgba(255,255,255,0.45)",fontSize:12,marginTop:2 }}>Partly Cloudy</div>
          <div style={{ color:"rgba(255,255,255,0.25)",fontSize:11,marginTop:2 }}>Puducherry, India</div>
        </div>
        <div style={{ fontSize:44 }}>⛅</div>
      </div>
      <div style={{ display:"flex",gap:5,marginTop:12 }}>
        {[["Mon","☀️","29°"],["Tue","🌧","22°"],["Wed","⛅","25°"],["Thu","☀️","31°"]].map(([d,e,t])=>(
          <div key={d} style={{ flex:1,background:"rgba(255,255,255,0.06)",borderRadius:10,
            padding:"7px 3px",textAlign:"center",border:"1px solid rgba(255,255,255,0.07)" }}>
            <div style={{ color:"rgba(255,255,255,0.3)",fontSize:9 }}>{d}</div>
            <div style={{ fontSize:15,margin:"3px 0" }}>{e}</div>
            <div style={{ color:"rgba(255,255,255,0.65)",fontSize:11,fontWeight:500 }}>{t}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── Main ─── */
const PANELS=[
  {id:"clock",  title:"Clock",  icon:"🕐",x:14,y:70, w:220},
  {id:"music",  title:"Music",  icon:"🎵",x:14,y:320,w:250},
  {id:"notes",  title:"Notes",  icon:"📝",x:248,y:90, w:230},
  {id:"weather",title:"Weather",icon:"🌤",x:248,y:350,w:230},
];

function App() {
  const [open,setOpen]=useState(["clock","music","notes","weather"]);
  const [zMap,setZMap]=useState({clock:10,music:9,notes:8,weather:7});
  const [zTop,setZTop]=useState(11);
  const [dark,setDark]=useState(false);

  const focus=useCallback((id)=>{
    setZTop(z=>{ const n=z+1; setZMap(m=>({...m,[id]:n})); return n; });
  },[]);

  const close =(id)=>setOpen(p=>p.filter(x=>x!==id));
  const toggle=(id)=>open.includes(id)?close(id):(setOpen(p=>[...p,id]),focus(id));

  return (
    <div style={{ width:"100vw",height:"100vh",overflow:"hidden",position:"fixed",inset:0 }}>
      <CameraFeed darkMode={dark}/>

      <div style={{ position:"fixed",inset:0,zIndex:10 }}>
        {PANELS.map(p=>open.includes(p.id)&&(
          <SpatialPanel key={p.id} id={p.id} title={p.title} icon={p.icon}
            initX={p.x} initY={p.y} width={p.w}
            zIndex={zMap[p.id]} onFocus={focus} onClose={close}
            dimmed={dark&&p.id!=="music"}>
            {p.id==="clock"   &&<ClockWidget/>}
            {p.id==="music"   &&<MusicWidget/>}
            {p.id==="notes"   &&<NotesWidget/>}
            {p.id==="weather" &&<WeatherWidget/>}
          </SpatialPanel>
        ))}
      </div>

      {dark&&<div style={{ position:"fixed",inset:0,zIndex:9,pointerEvents:"none",
        background:"radial-gradient(ellipse at center,rgba(0,0,0,0.2) 0%,rgba(0,0,0,0.93) 100%)"}}/>}

      {/* Dock */}
      <div style={{
        position:"fixed",bottom:18,left:"50%",transform:"translateX(-50%)",
        zIndex:9999,display:"flex",alignItems:"center",gap:5,padding:"9px 12px",
        background:"rgba(6,6,18,0.65)",backdropFilter:"blur(40px)",WebkitBackdropFilter:"blur(40px)",
        border:"1px solid rgba(255,255,255,0.14)",borderRadius:26,
        boxShadow:"0 8px 32px rgba(0,0,0,0.65)",
        opacity:dark?0.2:1,transition:"opacity 0.5s",
      }}>
        {PANELS.map(p=>(
          <button key={p.id} onClick={()=>toggle(p.id)} style={{
            width:44,height:44,borderRadius:13,fontSize:19,border:"none",
            background:open.includes(p.id)?"rgba(255,255,255,0.18)":"rgba(255,255,255,0.06)",
            cursor:"pointer",position:"relative",
          }}>
            {p.icon}
            {open.includes(p.id)&&<div style={{ position:"absolute",bottom:-6,left:"50%",
              transform:"translateX(-50%)",width:4,height:4,borderRadius:"50%",
              background:"rgba(255,255,255,0.7)"}}/>}
          </button>
        ))}
        <div style={{ width:1,height:26,background:"rgba(255,255,255,0.1)",margin:"0 2px"}}/>
        <button onClick={()=>setDark(d=>!d)} style={{
          width:44,height:44,borderRadius:13,fontSize:17,border:"none",
          background:dark?"rgba(255,255,255,0.9)":"rgba(255,255,255,0.06)",cursor:"pointer",
        }}>{dark?"☀️":"🎬"}</button>
      </div>

      {/* Status pill */}
      <div style={{
        position:"fixed",top:14,left:"50%",transform:"translateX(-50%)",zIndex:9999,
        padding:"5px 14px",background:"rgba(0,0,0,0.45)",backdropFilter:"blur(20px)",
        WebkitBackdropFilter:"blur(20px)",border:"1px solid rgba(255,255,255,0.1)",
        borderRadius:18,color:"rgba(255,255,255,0.45)",fontSize:9,letterSpacing:1.5,
        fontFamily:"system-ui",fontWeight:600,display:"flex",alignItems:"center",gap:5,
      }}>
        <div style={{ width:5,height:5,borderRadius:"50%",
          background:dark?"rgba(255,90,90,0.9)":"rgba(90,255,150,0.9)",
          boxShadow:dark?"0 0 6px rgba(255,90,90,0.7)":"0 0 6px rgba(90,255,150,0.7)"}}/>
        {dark?"CINEMA MODE":"VISION PRO"}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
